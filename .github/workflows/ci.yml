name: CI

on:
  push:
    branches: [main, core_nav]
  pull_request:
    branches: [main]

jobs:
  ros2-build:
    name: ROS2 Humble — colcon build & unit tests
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up ROS2 Humble
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: humble

      - name: Install rosdep dependencies
        run: |
          source /opt/ros/humble/setup.bash
          rosdep update
          rosdep install --from-paths src --ignore-src -r -y

      - name: Build workspace
        run: |
          source /opt/ros/humble/setup.bash
          colcon build --symlink-install --cmake-args -DCMAKE_BUILD_TYPE=Release

      - name: Run C++ unit tests
        run: |
          source /opt/ros/humble/setup.bash
          source install/setup.bash
          colcon test --packages-select swarmap_core swarmap_msgs
          colcon test-result --verbose

  frontend-build:
    name: Dashboard — npm build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/swarmap_dashboard/package-lock.json
      - run: npm ci
        working-directory: src/swarmap_dashboard
      - run: npm run build
        working-directory: src/swarmap_dashboard
